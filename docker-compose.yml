version: '3.8'

services:
  app:
    build: .
    restart: always
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
      - UPSTASH_REDIS_REST_URL=http://redis:6379
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  # watcher:
  #   build: ./services/twitter-watcher
  #   restart: always
  #   env_file: .env.production
  #   environment:
  #     - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
  #   depends_on:
  #     - redis

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  redis-data:
  caddy-data:
  caddy-config:
